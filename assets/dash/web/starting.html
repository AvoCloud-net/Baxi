<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baxi Dashboard -  Starting</title>
    <link rel="shortcut icon" href="https://avocloud.net/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta property="og:title" content="Baxi Dashboard">
    <meta property="og:description" content="Manage your Discord server with Baxi -  the modular, privacy-first bot from avocloud.net.">
    <meta property="og:url" content="https://baxi.avocloud.net/">
    <meta property="og:color" content="#FF6B4A">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.10-beta.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <script src="https://avocloud.net/assets/js/theme.js"></script>

    <style>
        .starting-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 1rem 3rem;
            gap: 1.25rem;
            min-height: 60vh;
        }
        .starting-hero .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.85rem;
            border-radius: 9999px;
            border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
            opacity: 0.7;
        }
        .starting-hero h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .starting-hero p {
            font-size: 1.05rem;
            max-width: 420px;
            opacity: 0.65;
            line-height: 1.65;
        }
        .spinner {
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid color-mix(in srgb, var(--color-primary, #FF6B4A) 20%, transparent);
            border-top-color: var(--color-primary, #FF6B4A);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .dot-pulse {
            display: inline-flex;
            gap: 0.35rem;
            align-items: center;
        }
        .dot-pulse span {
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 50%;
            background: var(--color-primary, #FF6B4A);
            opacity: 0.3;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="gradientbar"></div>

    <!-- Nav -->
    <nav class="site-nav" id="site-nav">
        <a class="avocloud-logo" href="/" aria-label="AVOCLOUD.NET">
            <span class="avocloud-logo__slot">
                <span class="avocloud-logo__icon">
                    <svg viewBox="0 0 72 72" fill="none">
                        <path d="M22 18 L12 18 L12 54 L22 54 M50 18 L60 18 L60 54 L50 54 M26 30 L33 36 L26 42"
                            stroke="currentColor" stroke-width="6"
                            stroke-linecap="round" stroke-linejoin="round"
                            pathLength="200"/>
                        <rect class="logo-cursor" x="40" y="28" width="4" height="16" rx="2"/>
                    </svg>
                </span>
                <span class="avocloud-logo__av">AVO</span>
            </span>
            <span class="avocloud-logo__rest-wrap">
                <span class="avocloud-logo__rest">CLOUD<span class="avocloud-logo__dot">.NET</span></span>
            </span>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
    </nav>

    <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="starting-hero">
            <span class="hero-badge">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                Baxi Dashboard
            </span>

            <div class="spinner"></div>

            <h1>Bot is starting</h1>
            <p>The dashboard will be available in a moment. This page refreshes automatically.</p>

            <div class="dot-pulse">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div style="display: flex; gap: 1.5rem; justify-content: center; padding: 0.5rem 0 1rem; flex-wrap: wrap;">
            <a href="/privacy/" class="footer-link">Privacy Policy</a>
            <a href="/terms/" class="footer-link">Terms of Service</a>
            <a href="https://avocloud.net/impressum.html" class="footer-link">Impressum</a>
        </div>
        <footer class="site-footer">
            <p>Avocloud.net &mdash; Baxi Dashboard</p>
        </footer>
    </div>

    
    <script>
        // Auto-refresh every 5 seconds until the bot is ready
        setTimeout(() => location.reload(), 10000);
    </script>
    <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
</body>

</html>
